name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync from upstream main branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ../cf-monitor-test-upstream
          git clone --depth 1 --branch main https://github.com/kadidalax/cf-monitor-test.git ../cf-monitor-test-upstream
          rsync -a --delete             --exclude '.git/'             --filter 'P .github/workflows/sync-upstream.yml'             ../cf-monitor-test-upstream/ ./
          rm -rf ../cf-monitor-test-upstream
          git add -A
          git commit -m "Sync upstream from kadidalax/cf-monitor-test" || echo "No changes to commit"
          git push origin main
